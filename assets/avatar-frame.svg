<svg width="320" height="320" viewBox="0 0 320 320" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="ringGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38BDF8"/>
      <stop offset="50%" stop-color="#818CF8"/>
      <stop offset="100%" stop-color="#F472B6"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="70%" stop-color="#38BDF8" stop-opacity="0"/>
      <stop offset="100%" stop-color="#38BDF8" stop-opacity="0.25"/>
    </radialGradient>
    <clipPath id="circleClip">
      <circle cx="160" cy="160" r="118"/>
    </clipPath>
  </defs>

  <!-- soft glow behind avatar -->
  <circle cx="160" cy="160" r="150" fill="url(#glow)"/>

  <!-- rotating dashed accent ring -->
  <circle cx="160" cy="160" r="140" fill="none" stroke="url(#ringGradient)" stroke-width="2" stroke-dasharray="4 10" opacity="0.6"/>

  <!-- main gradient ring -->
  <circle cx="160" cy="160" r="128" fill="none" stroke="url(#ringGradient)" stroke-width="6"/>

  <!-- inner dark ring for contrast -->
  <circle cx="160" cy="160" r="122" fill="none" stroke="#0D1117" stroke-width="3"/>

  <!-- avatar image (GitHub avatar via username) -->
  <image href="https://github.com/dinushamalshan37-oss.png?size=460"
         x="42" y="42" width="236" height="236"
         clip-path="url(#circleClip)" preserveAspectRatio="xMidYMid slice"/>

  <!-- corner accent dots -->
  <circle cx="160" cy="18" r="6" fill="#38BDF8"/>
  <circle cx="160" cy="302" r="6" fill="#F472B6"/>
  <circle cx="18" cy="160" r="6" fill="#818CF8"/>
  <circle cx="302" cy="160" r="6" fill="#38BDF8"/>

  <!-- small code-tag badge bottom right -->
  <circle cx="248" cy="248" r="24" fill="#0D1117" stroke="url(#ringGradient)" stroke-width="3"/>
  <text x="248" y="255" font-family="monospace" font-size="18" font-weight="bold" fill="#38BDF8" text-anchor="middle">&lt;/&gt;</text>
</svg>

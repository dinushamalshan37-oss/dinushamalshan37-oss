<svg width="320" height="320" viewBox="0 0 320 320" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="ringGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38BDF8"/>
      <stop offset="50%" stop-color="#818CF8"/>
      <stop offset="100%" stop-color="#F472B6"/>
    </linearGradient>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E293B"/>
      <stop offset="100%" stop-color="#0F172A"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="70%" stop-color="#38BDF8" stop-opacity="0"/>
      <stop offset="100%" stop-color="#38BDF8" stop-opacity="0.25"/>
    </radialGradient>
    <clipPath id="circleClip">
      <circle cx="160" cy="160" r="118"/>
    </clipPath>
  </defs>

  <!-- soft outer glow -->
  <circle cx="160" cy="160" r="150" fill="url(#glow)"/>

  <!-- dashed rotating accent ring -->
  <circle cx="160" cy="160" r="140" fill="none" stroke="url(#ringGradient)" stroke-width="2" stroke-dasharray="4 10" opacity="0.6"/>

  <!-- main gradient ring -->
  <circle cx="160" cy="160" r="128" fill="none" stroke="url(#ringGradient)" stroke-width="6"/>
  <circle cx="160" cy="160" r="122" fill="none" stroke="#0D1117" stroke-width="3"/>

  <!-- avatar content, clipped to circle -->
  <g clip-path="url(#circleClip)">
    <circle cx="160" cy="160" r="118" fill="url(#bgGradient)"/>

    <!-- floating code particles -->
    <text x="60" y="80" font-family="monospace" font-size="16" fill="#38BDF8" opacity="0.5">&lt;/&gt;</text>
    <text x="235" y="95" font-family="monospace" font-size="14" fill="#F472B6" opacity="0.5">{ }</text>
    <text x="55" y="240" font-family="monospace" font-size="14" fill="#818CF8" opacity="0.5">01</text>
    <text x="245" y="235" font-family="monospace" font-size="16" fill="#38BDF8" opacity="0.4">#</text>

    <!-- desk -->
    <rect x="60" y="235" width="200" height="10" rx="3" fill="#334155"/>

    <!-- coffee cup -->
    <rect x="80" y="205" width="20" height="28" rx="4" fill="#F472B6" opacity="0.9"/>
    <path d="M100 210 q12 2 6 14" stroke="#F472B6" stroke-width="3" fill="none" opacity="0.9"/>
    <line x1="86" y1="200" x2="86" y2="195" stroke="#94A3B8" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
    <line x1="94" y1="200" x2="94" y2="193" stroke="#94A3B8" stroke-width="2" stroke-linecap="round" opacity="0.6"/>

    <!-- laptop base -->
    <rect x="118" y="222" width="90" height="10" rx="2" fill="#475569"/>
    <!-- laptop screen -->
    <rect x="128" y="150" width="70" height="74" rx="4" fill="#1E293B" stroke="#475569" stroke-width="2"/>
    <rect x="134" y="157" width="58" height="60" rx="2" fill="#0B1220"/>
    <!-- code lines on screen -->
    <rect x="140" y="164" width="26" height="4" rx="2" fill="#38BDF8"/>
    <rect x="140" y="173" width="40" height="4" rx="2" fill="#818CF8"/>
    <rect x="146" y="182" width="34" height="4" rx="2" fill="#F472B6"/>
    <rect x="140" y="191" width="20" height="4" rx="2" fill="#38BDF8"/>
    <rect x="146" y="200" width="30" height="4" rx="2" fill="#818CF8"/>

    <!-- character head -->
    <circle cx="163" cy="110" r="30" fill="#FCD9B8"/>
    <!-- hair -->
    <path d="M133 105 q0 -35 30 -35 q30 0 30 35 q-8 -14 -30 -14 q-22 0 -30 14 Z" fill="#2B2118"/>
    <!-- glasses -->
    <circle cx="152" cy="112" r="8" fill="none" stroke="#0F172A" stroke-width="2.5"/>
    <circle cx="176" cy="112" r="8" fill="none" stroke="#0F172A" stroke-width="2.5"/>
    <line x1="160" y1="112" x2="168" y2="112" stroke="#0F172A" stroke-width="2.5"/>
    <!-- smile -->
    <path d="M154 124 q10 8 20 0" stroke="#0F172A" stroke-width="2.5" fill="none" stroke-linecap="round"/>

    <!-- shoulders / hoodie -->
    <path d="M118 200 q45 -30 90 0 l0 40 l-90 0 Z" fill="#38BDF8"/>
    <path d="M150 172 l13 14 l13 -14 l6 6 q-19 22 -38 0 Z" fill="#0F172A"/>
  </g>

  <!-- corner accent dots -->
  <circle cx="160" cy="18" r="6" fill="#38BDF8"/>
  <circle cx="160" cy="302" r="6" fill="#F472B6"/>
  <circle cx="18" cy="160" r="6" fill="#818CF8"/>
  <circle cx="302" cy="160" r="6" fill="#38BDF8"/>

  <!-- code-tag badge, bottom right -->
  <circle cx="248" cy="248" r="24" fill="#0D1117" stroke="url(#ringGradient)" stroke-width="3"/>
  <text x="248" y="255" font-family="monospace" font-size="18" font-weight="bold" fill="#38BDF8" text-anchor="middle">&lt;/&gt;</text>
</svg>
